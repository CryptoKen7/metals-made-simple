<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Guide 1 — The Private Metals Cheat Sheet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dark: #8B6914;
    --black: #080706;
    --white: #F5F0E8;
    --muted: rgba(245,240,232,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 600px;
    text-align: center;
  }

  .icon {
    width: 100px;
    height: 100px;
    margin: 0 auto 32px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .series {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 12px;
    line-height: 1.15;
  }

  h1 em {
    color: var(--gold-light);
    font-style: italic;
  }

  .subtitle {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 40px;
    line-height: 1.7;
  }

  .download-btn {
    display: inline-block;
    padding: 18px 48px;
    background: linear-gradient(135deg, #FFE680, #F0C030, #D4A017);
    border: none;
    border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: #000000;
    font-weight: 900;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.2s ease, transform 0.2s ease;
    margin-bottom: 24px;
  }

  .download-btn:hover {
    opacity: 0.92;
    transform: translateY(-2px);
  }

  .note {
    font-size: 13px;
    color: rgba(245,240,232,0.5);
    font-style: italic;
    margin-bottom: 40px;
  }

  .back-link {
    font-size: 14px;
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease;
  }

  .back-link:hover {
    border-bottom-color: var(--gold);
  }

</style>
</head>
<body>

<div class="container">
  <div class="icon">📄</div>
  
  <div class="series">✦ METALS MADE SIMPLE SERIES ✦</div>
  
  <h1>The <em>Private Metals</em><br>Cheat Sheet</h1>
  
  <div class="subtitle">
    Exactly which coins, bars & weights stay 100% private when you SELL — and which ones trigger IRS reporting
  </div>
  
  <a href="guide1.pdf" download class="download-btn">Download PDF Guide</a>
  
  <div class="note">Click above to download your free guide (PDF format)</div>
  
  <a href="free-guide.html" class="back-link">← Back to Free Guides Page</a>
</div>

</body>
</html>
